services:
  postgres:
    container_name: postgres
    image: postgres:18
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      retries: 5

  whymighta:
    container_name: whymighta
    image: ghcr.io/jothamteshome/whymighta:latest
    restart: always
    deploy:
      resources:
        limits:
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - ENV=production
      - AWS_REGION=us-east-1
      - DB_USERNAME=${WHYMIGHTA_DB_USERNAME}
      - DB_PASSWORD=${WHYMIGHTA_DB_PASSWORD}
      - DB_HOST=${WHYMIGHTA_DB_HOST}
      - DB_PORT=${WHYMIGHTA_DB_PORT}
      - DB_DATABASE=${WHYMIGHTA_DB_DATABASE}
      - AWS_CHATGPT_API_URL=${WHYMIGHTA_CHATGPT_API_URL}
      - AWS_CHATGPT_API_KEY=${WHYMIGHTA_CHATGPT_API_KEY}
      - WEATHER_API_KEY=${WHYMIGHTA_WEATHER_API_KEY}
      - DISCORD_TOKEN=${WHYMIGHTA_DISCORD_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy

  watch-together:
    container_name: watch-together
    image: ghcr.io/jothamteshome/watch-together-backend:latest
    restart: always
    deploy:
      resources:
        limits:
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - BACKEND_PORT=${WATCH_TOGETHER_BACKEND_PORT}
      - YOUTUBE_API_KEY=${WATCH_TOGETHER_YOUTUBE_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${BACKEND_PORT}/health"]
      interval: 5s
      retries: 5

  nginx:
    container_name: nginx
    image: nginx:alpine
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      watch-together:
        condition: service_healthy

volumes:
  postgres_data:
