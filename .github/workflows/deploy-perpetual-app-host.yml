name: Deploy perpetual-app-host infra to EC2 via AWS SSM

on:
  push:
    branches:
      - main
    paths:
      - 'compose/perpetual-app-host/**'
      - '.github/workflows/deploy-perpetual-app-host.yml'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ secrets.AWS_PERPETUAL_APP_HOST_ROLE_TO_ASSUME }}
        aws-region: us-east-1

    - name: Update SSM Parameters
      run: |
        aws ssm put-parameter --name "/perpetual-app-host/db/username" --value "${{ secrets.PERPETUAL_APP_HOST_POSTGRES_USER }}" --type "String" --overwrite
        aws ssm put-parameter --name "/perpetual-app-host/db/password" --value "${{ secrets.PERPETUAL_APP_HOST_POSTGRES_PASSWORD }}" --type "SecureString" --overwrite
        aws ssm put-parameter --name "/perpetual-app-host/pihole/webpassword" --value "${{ secrets.PERPETUAL_APP_HOST_PIHOLE_WEBPASSWORD }}" --type "SecureString" --overwrite
        aws ssm put-parameter --name "/perpetual-app-host/wireguard/serverurl" --value "${{ secrets.PERPETUAL_APP_HOST_WIREGUARD_SERVERURL }}" --type "String" --overwrite
        aws ssm put-parameter --name "/perpetual-app-host/wireguard/peers" --value "${{ secrets.PERPETUAL_APP_HOST_WIREGUARD_PEERS }}" --type "String" --overwrite
        aws ssm put-parameter --name "/perpetual-app-host/open-webui/db/username" --value "${{ secrets.PERPETUAL_APP_HOST_OPEN_WEBUI_DB_USERNAME }}" --type "String" --overwrite
        aws ssm put-parameter --name "/perpetual-app-host/open-webui/db/password" --value "${{ secrets.PERPETUAL_APP_HOST_OPEN_WEBUI_DB_PASSWORD }}" --type "SecureString" --overwrite
        aws ssm put-parameter --name "/perpetual-app-host/open-webui/db/database" --value "${{ secrets.PERPETUAL_APP_HOST_OPEN_WEBUI_DB_DATABASE }}" --type "String" --overwrite

    - name: Deploy on EC2
      run: |
        command_id=$(aws ssm send-command \
          --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
          --document-name "AWS-RunShellScript" \
          --parameters '{"commands":[
            "git config --system --add safe.directory /opt/infra-hub",
            "git -C /opt/infra-hub fetch origin main",
            "git -C /opt/infra-hub reset --hard origin/main",
            "bash /opt/infra-hub/compose/perpetual-app-host/scripts/setup-instance.sh",
            "bash -c \". /etc/profile.d/init-env.sh && cd /opt/infra-hub/compose/perpetual-app-host && docker compose up -d && docker image prune -f\""
          ]}' \
          --comment "Deploy perpetual-app-host infra" \
          --query "Command.CommandId" \
          --output text)

        aws ssm wait command-executed \
          --command-id "$command_id" \
          --instance-id ${{ secrets.EC2_INSTANCE_ID }}

        aws ssm get-command-invocation \
          --command-id "$command_id" \
          --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
          --query "StandardOutputContent" \
          --output text