upstream watch-together-backend {
    server watch-together:4000;
}

server {
    listen 443 ssl;
    server_name api.watch-together.whymighta.net;

    ssl_certificate /etc/letsencrypt/live/api.watch-together.whymighta.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.watch-together.whymighta.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://watch-together-backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
    }

    access_log /var/log/nginx/watch-together.access.log;
    error_log /var/log/nginx/watch-together.error.log;
}

server {
    listen 80;
    server_name api.watch-together.whymighta.net;

    if ($host = api.watch-together.whymighta.net) {
        return 301 https://$host$request_uri;
    }

    return 404;
}
