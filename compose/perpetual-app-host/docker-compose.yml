services:
  postgres:
    container_name: postgres
    image: postgres:18-alpine
    restart: always
    deploy:
      resources:
        limits:
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      retries: 5

  db-init:
    container_name: db-init
    image: postgres:18-alpine
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 64m
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "1"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PGPASSWORD=${POSTGRES_PASSWORD}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        psql -h postgres -U "$POSTGRES_USER" -d postgres -c "CREATE USER \"$WHYMIGHTA_DB_USERNAME\" WITH PASSWORD '$WHYMIGHTA_DB_PASSWORD';" || true
        psql -h postgres -U "$POSTGRES_USER" -d postgres -c "CREATE DATABASE \"$WHYMIGHTA_DB_DATABASE\" OWNER \"$WHYMIGHTA_DB_USERNAME\";" || true
        psql -h postgres -U "$POSTGRES_USER" -d postgres -c "GRANT ALL PRIVILEGES ON DATABASE \"$WHYMIGHTA_DB_DATABASE\" TO \"$WHYMIGHTA_DB_USERNAME\";" || true
        psql -h postgres -U "$POSTGRES_USER" -d postgres -c "ALTER DATABASE \"$WHYMIGHTA_DB_DATABASE\" OWNER TO \"$WHYMIGHTA_DB_USERNAME\";" || true

  whymighta:
    container_name: whymighta
    image: ghcr.io/jothamteshome/whymighta:latest
    restart: always
    deploy:
      resources:
        limits:
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - ENV=production
      - AWS_REGION=us-east-1
      - DB_USERNAME=${WHYMIGHTA_DB_USERNAME}
      - DB_PASSWORD=${WHYMIGHTA_DB_PASSWORD}
      - DB_HOST=${WHYMIGHTA_DB_HOST}
      - DB_PORT=${WHYMIGHTA_DB_PORT}
      - DB_DATABASE=${WHYMIGHTA_DB_DATABASE}
      - OPENAI_API_KEY=${WHYMIGHTA_OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${WHYMIGHTA_ANTHROPIC_API_KEY}
      - OPENAI_MODEL=${WHYMIGHTA_OPENAI_MODEL}
      - ANTHROPIC_MODEL=${WHYMIGHTA_ANTHROPIC_MODEL}
      - WEATHER_API_KEY=${WHYMIGHTA_WEATHER_API_KEY}
      - DISCORD_TOKEN=${WHYMIGHTA_DISCORD_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  watch-together:
    container_name: watch-together
    image: ghcr.io/jothamteshome/watch-together-backend:latest
    restart: always
    deploy:
      resources:
        limits:
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - BACKEND_PORT=${WATCH_TOGETHER_BACKEND_PORT}
      - YOUTUBE_API_KEY=${WATCH_TOGETHER_YOUTUBE_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${WATCH_TOGETHER_BACKEND_PORT}/health"]
      interval: 5s
      retries: 5

  nginx:
    container_name: nginx
    image: nginx:alpine
    restart: always
    deploy:
      resources:
        limits:
          memory: 64m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      watch-together:
        condition: service_healthy

  pihole:
    container_name: pihole
    image: mpgirro/pihole-unbound:latest
    restart: always
    deploy:
      resources:
        limits:
          memory: 256m
    environment:
      - TZ=America/New_York
      - FTLCONF_webserver_api_password=${PIHOLE_WEBPASSWORD}
      - FTLCONF_LOCAL_IPV4=10.13.13.100
      - FTLCONF_dns_upstreams=127.0.0.1#5335
      - DNSSEC=true
      - DNSMASQ_LISTENING=all
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    volumes:
      - pihole_data:/etc/pihole
      - pihole_dnsmasq:/etc/dnsmasq.d
    networks:
      default:
        ipv4_address: 10.13.13.100
    dns:
      - 127.0.0.1
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
  
  wireguard:
    container_name: wireguard
    image: linuxserver/wireguard:latest
    restart: always
    deploy:
      resources:
        limits:
          memory: 64m
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - SERVERURL=${WIREGUARD_SERVERURL}
      - SERVERPORT=51820
      - PEERS=${WIREGUARD_PEERS}
      - PEERDNS=10.13.13.100
      - INTERNAL_SUBNET=10.13.13.0
      - ALLOWEDIPS=10.13.13.0/24
    volumes:
      - wireguard_config:/config
      - /lib/modules:/lib/modules:ro
    ports:
      - "51820:51820/udp"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
  
  portainer:
    container_name: portainer
    image: portainer/portainer-ce:latest
    restart: always
    deploy:
      resources:
        limits:
          memory: 256m
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      default:
        ipv4_address: 10.13.13.101
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  pihole_data:
  pihole_dnsmasq:
  wireguard_config:
  portainer_data:

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 10.13.13.0/24
          ip_range: 10.13.13.128/25
