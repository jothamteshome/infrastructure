name: Deploy Minecraft Server Startup Lambda

on:
  push:
    branches: [main]
    paths:
      - 'lambdas/minecraft-server-startup/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_LAMBDA_DEPLOY_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Zip Lambda package
        working-directory: lambdas/minecraft-server-startup
        run: |
          zip -r minecraft-server-startup.zip lambda_function.py

      - name: Update Lambda function code
        working-directory: lambdas/minecraft-server-startup
        run: |
          aws lambda update-function-code \
            --function-name minecraft-server-startup \
            --zip-file fileb://minecraft-server-startup.zip \
            --region us-east-1