services:
  postgres:
    image: postgres:18
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      retries: 5

  whymighta:
    image: ghcr.io/jothamteshome/whymighta:latest
    restart: always
    environment:
      - ENV=production
      - AWS_REGION=us-east-1
      - DB_USERNAME=${WHYMIGHTA_DB_USERNAME}
      - DB_PASSWORD=${WHYMIGHTA_DB_PASSWORD}
      - DB_HOST=${WHYMIGHTA_DB_HOST}
      - DB_PORT=${WHYMIGHTA_DB_PORT}
      - DB_DATABASE=${WHYMIGHTA_DB_DATABASE}
      - AWS_CHATGPT_API_URL=${WHYMIGHTA_CHATGPT_API_URL}
      - AWS_CHATGPT_API_KEY=${WHYMIGHTA_CHATGPT_API_KEY}
      - WEATHER_API_KEY=${WHYMIGHTA_WEATHER_API_KEY}
      - DISCORD_TOKEN=${WHYMIGHTA_DISCORD_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy

  watch-together:
    image: ghcr.io/jothamteshome/watch-together-backend:latest
    restart: always
    environment:
      - BACKEND_PORT=${WATCH_TOGETHER_BACKEND_PORT}
      - YOUTUBE_API_KEY=${WATCH_TOGETHER_YOUTUBE_API_KEY}

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - watch-together

volumes:
  postgres_data:
