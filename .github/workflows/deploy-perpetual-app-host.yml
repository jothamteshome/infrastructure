name: Deploy perpetual-app-host infra to EC2 via AWS SSM

on:
  push:
    branches:
      - main
    paths:
      - 'compose/perpetual-app-host/**'
      - '.github/workflows/deploy-perpetual-app-host.yml'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ secrets.AWS_PERPETUAL_APP_HOST_ROLE_TO_ASSUME }}
        aws-region: us-east-1

    - name: Deploy on EC2
      run: |
        command_id=$(aws ssm send-command \
          --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
          --document-name "AWS-RunShellScript" \
          --parameters '{"commands":[
            "git config --system --add safe.directory /opt/infra-hub",
            "git -C /opt/infra-hub fetch origin main",
            "git -C /opt/infra-hub reset --hard origin/main",
            "bash /opt/infra-hub/compose/perpetual-app-host/scripts/setup-instance.sh",
            "bash -c \". /etc/profile.d/init-env.sh && cd /opt/infra-hub/compose/perpetual-app-host && docker compose up -d && docker image prune -f\""
          ]}' \
          --comment "Deploy perpetual-app-host infra" \
          --query "Command.CommandId" \
          --output text)

        aws ssm wait command-executed \
          --command-id "$command_id" \
          --instance-id ${{ secrets.EC2_INSTANCE_ID }}

        aws ssm get-command-invocation \
          --command-id "$command_id" \
          --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
          --query "StandardOutputContent" \
          --output text