name: Static Site Build Deployment Workflow

on:
  workflow_call:
    inputs:
      working_directory:
        required: false
        type: string
        default: '.'
      build_env:
        required: false
        type: string
        default: ''
    secrets:
      AWS_STATIC_SITE_ROLE_TO_ASSUME:
        required: true
      HOSTED_ZONE_NAME:
        required: true
      HOSTED_ZONE_ID:
        required: true
      DOMAIN_NAME:
        required: false


jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout React repo
        uses: actions/checkout@v6

      - name: Checkout Infra repo
        uses: actions/checkout@v6
        with:
          repository: jothamteshome/infra-hub
          path: infra

      - name: Format repository name correctly
        run: |
          FULL_REPO_NAME="${{ github.repository }}"
          FORMATTED_REPO_NAME=${FULL_REPO_NAME##*/}
          echo "FORMATTED_REPO_NAME=$FORMATTED_REPO_NAME" >> $GITHUB_ENV
          echo "FORMATTED_REPO_NAME=$FORMATTED_REPO_NAME"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_STATIC_SITE_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Write build env
        if: inputs.build_env != ''
        working-directory: ${{ inputs.working_directory }}
        run: echo "${{ inputs.build_env }}" > .env.local

      - name: Build project
        if: hashFiles(format('{0}/package-lock.json', inputs.working_directory)) != ''
        working-directory: ${{ inputs.working_directory }}
        run: |
          npm ci
          npm run build

      - name: Install CDK CLI
        run: |
          npm install -g aws-cdk

      - name: Install CDK requirements
        working-directory: infra/static-sites
        run: pip install -r requirements.txt

      - name: Deploy CDK stack
        working-directory: infra/static-sites
        env:
          HOSTED_ZONE_NAME: ${{ secrets.HOSTED_ZONE_NAME }}
          HOSTED_ZONE_ID: ${{ secrets.HOSTED_ZONE_ID }}
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
        run: cdk deploy --app "python3 app.py" --context repo_name="$FORMATTED_REPO_NAME" --require-approval never
      
      - name: Get Bucket Name & CloudFront ID
        id: get_outputs
        run: |
          STACK_NAME="${FORMATTED_REPO_NAME}-static-site"
          BUCKET_NAME=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query "Stacks[0].Outputs[?OutputKey=='BucketNameOutput'].OutputValue" \
            --output text)
          CLOUDFRONT_ID=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontIdOutput'].OutputValue" \
            --output text)
          echo "BUCKET_NAME=$BUCKET_NAME" >> $GITHUB_ENV
          echo "CLOUDFRONT_ID=$CLOUDFRONT_ID" >> $GITHUB_ENV

      - name: Sync React build to S3
        working-directory: ${{ inputs.working_directory }}
        run: |
          if [ -d "build/client" ]; then
            BUILD_DIR="build/client/"
          elif [ -d "build" ]; then
            BUILD_DIR="build/"
          elif [ -d "dist" ]; then
            BUILD_DIR="dist/"
          elif [ -d ".next" ]; then
            BUILD_DIR=".next/"
          else
            BUILD_DIR="./"
          fi

          echo "Using build directory: $BUILD_DIR"
          aws s3 sync $BUILD_DIR s3://$BUCKET_NAME --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "infra/*" \
            --exclude ".gitignore"

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_ID --paths "/*"

